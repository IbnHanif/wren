<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wren.</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assests/Wern-favicon.png">

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Serif+Display&display=swap"
    rel="stylesheet"
  >

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="brand">
      <img
        src="assests/Wern-favicon.png"
        alt="Wren"
        class="brand-icon"
        width="36"
        height="36"
      >
      <span class="brand-name">Wren.</span>
    </div>

    <div class="nav-actions">
      <!-- Theme: icon shows NEXT theme you'll switch TO -->
      <button class="icon-btn" id="themeBtn" aria-label="Toggle theme">
        <i data-lucide="sun"></i>
      </button>

      <!-- Orientation: icon shows NEXT orientation -->
      <button class="icon-btn" id="orientationBtn" aria-label="Toggle orientation">
        <i data-lucide="monitor"></i>
      </button>
    </div>
  </nav>

  <!-- ===== SEARCH ===== -->
  <div class="search-wrapper">
    <div class="search-bar">
      <i data-lucide="search" class="search-icon"></i>
      <input
        type="text"
        id="searchInput"
        placeholder="Search anything — mountains, dark, minimal..."
        autocomplete="off"
        spellcheck="false"
      >
    </div>
  </div>

  <!-- ===== GRID ===== -->
  <main class="grid" id="grid">
    <!-- cards injected by JS -->
  </main>

  <!-- SENTINEL: outside grid, watched by IntersectionObserver -->
  <div id="sentinel" aria-hidden="true"></div>

  <!-- ===== END MESSAGE ===== -->
  <div class="end-message" id="endMessage" aria-live="polite">
    <!-- JS injects text + reload button -->
  </div>

  <!-- ===== CARD TEMPLATE ===== -->
  <template id="cardTemplate">
    <div class="card">
      <img loading="lazy" alt="" decoding="async">
      <div class="card-overlay">
        <button class="btn-preview">Full Preview</button>
        <button class="btn-download">Download</button>
      </div>
    </div>
  </template>

  <!-- ===== MODAL ===== -->
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Image preview">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose" aria-label="Close preview">
        <i data-lucide="x"></i>
      </button>
      <img id="modalImg" alt="">
      <a class="modal-download" id="modalDownload" download>
        <i data-lucide="download"></i>
        Download
      </a>
      <p class="modal-credit">
        Photo by
        <a id="photographerLink" target="_blank" rel="noopener noreferrer"></a>
        on Unsplash
      </p>
    </div>
  </div>

  <script src="script.js"></script>
  <script>lucide.createIcons();</script>

</body>
</html>
